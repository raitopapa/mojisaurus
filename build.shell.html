<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#8fd0ff">
<title>もじざうるす</title>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; overflow:hidden; background:#dff4ff;
    font-family:'Baloo 2','Hiragino Maru Gothic ProN','Yu Gothic UI','M PLUS Rounded 1c',sans-serif;
    -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none;
    overscroll-behavior:none; touch-action:none; }
  #stage{ position:fixed; inset:0; background:linear-gradient(180deg,#8fd0ff,#dff4ff); }
  #game{ display:block; width:100%; height:100%; touch-action:none; }
  .topbtns{ position:absolute; top:max(10px,env(safe-area-inset-top)); right:max(10px,env(safe-area-inset-right));
    display:flex; gap:10px; z-index:6; }
  .iconbtn{ width:52px; height:52px; border-radius:16px; border:none; cursor:pointer;
    background:rgba(255,255,255,.72); color:#2b3a67; font-size:24px; font-weight:800; line-height:1;
    box-shadow:0 3px 10px rgba(0,0,0,.2); backdrop-filter:blur(4px);
    display:flex; align-items:center; justify-content:center; touch-action:manipulation;
    -webkit-user-select:none; user-select:none; }
  .iconbtn:active{ transform:translateY(1px) scale(.96); }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game"></canvas>
    <div class="topbtns">
      <button class="iconbtn" id="muteBtn" title="おと" aria-label="おと" aria-pressed="false">&#128266;</button>
      <button class="iconbtn" id="fsBtn" title="ぜんめん" aria-label="ぜんめん">&#9974;</button>
    </div>
  </div>
<!--BUNDLE-->
</body>
</html>
