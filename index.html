<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">

<style>

  #game{ display:block; width:100%; height:100%; touch-action:none; }

    box-shadow:0 3px 10px rgba(0,0,0,.2); backdrop-filter:blur(4px);

  <div id="stage">
    <canvas id="game"></canvas>
    <div class="topbtns">
      <button class="iconbtn" id="muteBtn" title="おと" aria-label="おと" aria-pressed="false">&#128266;</button>
      <button class="iconbtn" id="fsBtn" title="ぜんめん" aria-label="ぜんめん">&#9974;</button>
    </div>
  </div>
<script>
(()=>{'use strict';

/* ===== core/constants.js ===== */
// core/constants.js — 純粋データ（物理・寸法・配色・保存キー）。他モジュール依存なし。
// Bramble系の規約に合わせ、export は末尾に1つだけ置く（build.mjs が行頭 import/export を除去）。

const STEP = 1 / 60;            // 固定タイムステップ（loop）
const BASE_W = 960;             // 内部座標の基準幅（16:9 目安、resize でスケール）
const BASE_H = 540;             // 内部座標の基準高さ

const SAVE_KEY = 'mojisaurus.save.v1';
const SAVE_VERSION = 1;

const VOICE_RATE = 0.95;        // TTS 読み上げ速度（仕様§8.5）
const STARS_PER_EGG = 22;       // たまご孵化に必要な星（仕様§10目安・home/lesson共有）

// シーン名（scene-manager のキー）。文字列直書きの散逸を防ぐ。
const SCENE = {
  TITLE: 'title', HOME: 'home', LESSON: 'lesson', GAME_SELECT: 'game_select',
  REWARD: 'reward', ZUKAN: 'zukan', PARENT: 'parent',
};

// 明るくポップな「もじのしま」パレット（怖い/暗い配色は避ける・仕様§2）
const COLORS = {
  skyTop: '#8fd0ff', skyBot: '#dff4ff',
  grass: '#74d06e', grassDark: '#4bb04a',
  sand: '#ffe3ad', sandDark: '#f4c877',
  ink: '#2b3a67',            // 文字・輪郭（黒でなく深い青）
  accent: '#ffc53a',         // アクセント（金）
  white: '#ffffff',
  // ホームの学習ボタン色（陽気に色分け）
  btnKaku: '#ff8a5c', btnKotoba: '#57c06a', btnKatakana: '#b58cff',
  btnZukan: '#5cc8ff', btnParent: '#c9b191',
  gao: '#7fd47a', gaoDark: '#4fae55', gaoBelly: '#eafbe6',
};

/* ===== core/utils.js ===== */
// core/utils.js — 純粋関数のみ（副作用なし）。ctx を要する描画ヘルパは canvas.js 側。

const clamp = (v, lo, hi) => v < lo ? lo : v > hi ? hi : v;
const lerp = (a, b, t) => a + (b - a) * t;
const rand = (a = 1, b) => b === undefined ? Math.random() * a : a + Math.random() * (b - a);
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

// 決定的乱数（種つき）。出題の再現・テストに使う。
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// 矩形の内側判定（タップのヒットテスト用・内部座標）
const pointInRect = (px, py, r) => px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;

/* ===== core/svg-path.js ===== */
// core/svg-path.js — 依存ゼロの軽量SVGパス(d属性)パーサ＆等間隔サンプラ。
// DOMのSVG要素やgetPointAtLengthに依存しない自前実装＝ブラウザ/Node(テスト)で同一動作。
// 対応コマンド: M/m L/l C/c Q/q Z/z（KanjiVG由来のなぞりデータに十分な範囲）。

function parsePathD(d) {
  const toks = String(d).match(/[MLCQZmlcqz]|-?\d*\.\d+(?:e-?\d+)?|-?\d+(?:e-?\d+)?/g) || [];
  const commands = [];
  let i = 0, cmd = null;
  const nums = (n) => { const out = []; for (let k = 0; k < n; k++) out.push(parseFloat(toks[i++])); return out; };
  while (i < toks.length) {
    if (/^[MLCQZmlcqz]$/.test(toks[i])) { cmd = toks[i]; i++; }
    if (cmd == null) { i++; continue; }
    switch (cmd) {
      case 'M': case 'm': { const [x, y] = nums(2); commands.push({ t: 'M', x, y, rel: cmd === 'm' }); cmd = (cmd === 'M') ? 'L' : 'l'; break; }
      case 'L': case 'l': { const [x, y] = nums(2); commands.push({ t: 'L', x, y, rel: cmd === 'l' }); break; }
      case 'C': case 'c': { const [x1, y1, x2, y2, x, y] = nums(6); commands.push({ t: 'C', x1, y1, x2, y2, x, y, rel: cmd === 'c' }); break; }
      case 'Q': case 'q': { const [x1, y1, x, y] = nums(4); commands.push({ t: 'Q', x1, y1, x, y, rel: cmd === 'q' }); break; }
      case 'Z': case 'z': { commands.push({ t: 'Z' }); break; }
      default: i++;
    }
  }
  return commands;
}

// 三次/二次ベジェを線分列へ分割し、稠密なポリラインにする。
function flattenCommands(commands, segments = 24) {
  const pts = []; let cx = 0, cy = 0, sx = 0, sy = 0;
  const push = (x, y) => pts.push({ x, y });
  for (const c of commands) {
    if (c.t === 'M') { const x = c.rel ? cx + c.x : c.x, y = c.rel ? cy + c.y : c.y; cx = x; cy = y; sx = x; sy = y; push(x, y); }
    else if (c.t === 'L') { const x = c.rel ? cx + c.x : c.x, y = c.rel ? cy + c.y : c.y; push(x, y); cx = x; cy = y; }
    else if (c.t === 'C') {
      const x1 = c.rel ? cx + c.x1 : c.x1, y1 = c.rel ? cy + c.y1 : c.y1;
      const x2 = c.rel ? cx + c.x2 : c.x2, y2 = c.rel ? cy + c.y2 : c.y2;
      const x = c.rel ? cx + c.x : c.x, y = c.rel ? cy + c.y : c.y;
      for (let s = 1; s <= segments; s++) {
        const t = s / segments, mt = 1 - t;
        push(mt * mt * mt * cx + 3 * mt * mt * t * x1 + 3 * mt * t * t * x2 + t * t * t * x,
             mt * mt * mt * cy + 3 * mt * mt * t * y1 + 3 * mt * t * t * y2 + t * t * t * y);
      }
      cx = x; cy = y;
    } else if (c.t === 'Q') {
      const x1 = c.rel ? cx + c.x1 : c.x1, y1 = c.rel ? cy + c.y1 : c.y1;
      const x = c.rel ? cx + c.x : c.x, y = c.rel ? cy + c.y : c.y;
      for (let s = 1; s <= segments; s++) {
        const t = s / segments, mt = 1 - t;
        push(mt * mt * cx + 2 * mt * t * x1 + t * t * x, mt * mt * cy + 2 * mt * t * y1 + t * t * y);
      }
      cx = x; cy = y;
    } else if (c.t === 'Z') { push(sx, sy); cx = sx; cy = sy; }
  }
  return pts;
}

function withLengths(pts) {
  const acc = [0];
  for (let i = 1; i < pts.length; i++) acc.push(acc[i - 1] + Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y));
  return { pts, acc, total: acc[acc.length - 1] || 0 };
}

function pointAtLength(poly, len) {
  const { pts, acc, total } = poly;
  if (!pts.length) return { x: 0, y: 0 };
  if (total <= 0) return { x: pts[0].x, y: pts[0].y };
  len = Math.max(0, Math.min(total, len));
  let i = 1; while (i < acc.length && acc[i] < len) i++;
  const i0 = Math.max(0, i - 1), i1 = Math.min(pts.length - 1, i);
  const segLen = acc[i1] - acc[i0] || 1, t = (len - acc[i0]) / segLen;
  return { x: pts[i0].x + (pts[i1].x - pts[i0].x) * t, y: pts[i0].y + (pts[i1].y - pts[i0].y) * t };
}

// d文字列 → { points, length, poly } を返す。points は約 spacing px 間隔の等間隔点列（なぞり判定用）。
function samplePath(d, spacing = 8, curveSegments = 24) {
  const poly = withLengths(flattenCommands(parsePathD(d), curveSegments));
  const n = Math.max(2, Math.round(poly.total / spacing));
  const points = []; for (let i = 0; i <= n; i++) points.push(pointAtLength(poly, (i / n) * poly.total));
  return { points, length: poly.total, poly };
}

function parseViewBox(vb, fallback = 100) {
  const m = String(vb || '').trim().split(/\s+/).map(Number);
  if (m.length === 4 && m.every(n => !isNaN(n))) return { w: m[2], h: m[3] };
  return { w: fallback, h: fallback };
}

/* ===== core/canvas.js ===== */
// core/canvas.js — Canvas と ctx の保持、リサイズ、client→内部座標変換、共通描画ヘルパ。
// 内部座標 = CSS px（等倍）。ctx を dpr スケールして描画は常に CSS px で行う＝タップずれ防止（仕様§13）。

const FONT = "'Baloo 2','Hiragino Maru Gothic ProN','Yu Gothic UI','M PLUS Rounded 1c',sans-serif";

const canvasEl = document.getElementById('game');
const ctx = canvasEl.getContext('2d');
const stageEl = document.getElementById('stage') || (canvasEl.parentElement || canvasEl);

const view = { w: 960, h: 540, dpr: 1 };

function resize() {
  const cssW = stageEl.clientWidth || canvasEl.clientWidth || 960;
  const cssH = stageEl.clientHeight || canvasEl.clientHeight || 540;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvasEl.width = Math.max(1, Math.round(cssW * dpr));
  canvasEl.height = Math.max(1, Math.round(cssH * dpr));
  view.w = cssW; view.h = cssH; view.dpr = dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);   // 以降 CSS px で描ける
  ctx.imageSmoothingEnabled = true;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
if (window.ResizeObserver) { try { new ResizeObserver(resize).observe(stageEl); } catch (_) {} }

// client 座標 → 内部座標（CSS px）。rect と view のズレも吸収。
function toInternal(clientX, clientY) {
  const r = canvasEl.getBoundingClientRect();
  const sx = view.w / (r.width || view.w || 1);
  const sy = view.h / (r.height || view.h || 1);
  return { x: (clientX - r.left) * sx, y: (clientY - r.top) * sy };
}

// ---- 描画ヘルパ ----
function rrPath(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function label(txt, x, y, o = {}) {
  ctx.save();
  ctx.font = `${o.weight || 800} ${o.size || 28}px ${FONT}`;
  ctx.textAlign = o.align || 'center';
  ctx.textBaseline = o.baseline || 'middle';
  if (o.shadow) { ctx.fillStyle = 'rgba(0,0,0,0.18)'; ctx.fillText(txt, x + (o.shadow), y + (o.shadow)); }
  ctx.fillStyle = o.color || COLORS.ink;
  ctx.fillText(txt, x, y);
  ctx.restore();
}

// 実測テキスト幅（label と同一フォント設定で measureText）。フォント差・端末差に依存しないレイアウト用。
function textWidth(txt, size, weight) {
  ctx.save();
  ctx.font = `${weight || 800} ${size || 28}px ${FONT}`;
  const w = ctx.measureText(txt).width;
  ctx.restore();
  return w;
}

// ふんわり角丸ボタン（押下時 pressed で少し沈む）
function pill(rect, o = {}) {
  const p = o.pressed ? 3 : 0;
  const x = rect.x, y = rect.y + p, w = rect.w, h = rect.h, r = o.radius ?? Math.min(w, h) * 0.32;
  ctx.save();
  if (!o.pressed) { ctx.fillStyle = 'rgba(0,0,0,0.16)'; rrPath(x, y + 6, w, h, r); ctx.fill(); }
  const g = ctx.createLinearGradient(0, y, 0, y + h);
  g.addColorStop(0, o.top || '#ffffff'); g.addColorStop(1, o.fill || '#dddddd');
  ctx.fillStyle = g; rrPath(x, y, w, h, r); ctx.fill();
  ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(255,255,255,0.65)'; rrPath(x + 2, y + 2, w - 4, h - 4, r - 2); ctx.stroke();
  ctx.restore();
  if (o.label) label(o.label, x + w / 2, y + h / 2, { size: o.labelSize || 30, color: o.labelColor || '#ffffff', shadow: 1.5 });
}

// 背景（空→地面）。もじのしまの明るい配色。
function fillBg() {
  const g = ctx.createLinearGradient(0, 0, 0, view.h);
  g.addColorStop(0, COLORS.skyTop); g.addColorStop(1, COLORS.skyBot);
  ctx.fillStyle = g; ctx.fillRect(0, 0, view.w, view.h);
  const gh = Math.min(view.h * 0.22, 150), gy = view.h - gh;
  const gg = ctx.createLinearGradient(0, gy, 0, view.h);
  gg.addColorStop(0, COLORS.grass); gg.addColorStop(1, COLORS.grassDark);
  ctx.fillStyle = gg; ctx.fillRect(0, gy, view.w, gh);
}

// ナビキャラ「ガオ」の暫定描画（差し替え可・本デザインはアセット/ui でBatch2）
function drawGao(x, y, size, mood = 'normal') {
  const s = size;
  ctx.save();
  // からだ
  const bg = ctx.createRadialGradient(x, y - s * 0.15, s * 0.2, x, y, s);
  bg.addColorStop(0, COLORS.gao); bg.addColorStop(1, COLORS.gaoDark);
  ctx.fillStyle = bg; ctx.beginPath(); ctx.ellipse(x, y, s * 0.9, s, 0, 0, Math.PI * 2); ctx.fill();
  // せなかのトゲ（三角3つ）
  ctx.fillStyle = COLORS.gaoDark;
  for (let i = -1; i <= 1; i++) { ctx.beginPath(); const bx = x + i * s * 0.42, by = y - s * 0.86; ctx.moveTo(bx - s * 0.14, by + s * 0.16); ctx.lineTo(bx, by - s * 0.18); ctx.lineTo(bx + s * 0.14, by + s * 0.16); ctx.closePath(); ctx.fill(); }
  // おなか
  ctx.fillStyle = COLORS.gaoBelly; ctx.beginPath(); ctx.ellipse(x, y + s * 0.2, s * 0.5, s * 0.55, 0, 0, Math.PI * 2); ctx.fill();
  // め
  const eo = mood === 'cheer' ? s * 0.06 : 0;
  for (const dx of [-1, 1]) {
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(x + dx * s * 0.34, y - s * 0.3, s * 0.2, s * 0.24, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = COLORS.ink; ctx.beginPath(); ctx.ellipse(x + dx * s * 0.34, y - s * 0.26 - eo, s * 0.1, s * 0.12, 0, 0, Math.PI * 2); ctx.fill();
  }
  // ほっぺ
  ctx.fillStyle = 'rgba(255,120,120,0.5)';
  for (const dx of [-1, 1]) { ctx.beginPath(); ctx.ellipse(x + dx * s * 0.55, y - s * 0.05, s * 0.13, s * 0.09, 0, 0, Math.PI * 2); ctx.fill(); }
  // くち（にっこり）
  ctx.strokeStyle = COLORS.ink; ctx.lineWidth = Math.max(2, s * 0.045); ctx.lineCap = 'round';
  ctx.beginPath();
  if (mood === 'happy' || mood === 'cheer') ctx.arc(x, y - s * 0.02, s * 0.22, 0.15 * Math.PI, 0.85 * Math.PI);
  else ctx.arc(x, y + s * 0.02, s * 0.16, 0.2 * Math.PI, 0.8 * Math.PI);
  ctx.stroke();
  ctx.restore();
}

/* ===== core/audio.js ===== */
// core/audio.js — Web Audio による効果音・音声アンロック。外部依存なし・自己完結（dash と同型）。
// 音声アンロック：iOS/Safari は初回ユーザー操作まで音が出ない。initAudioOnce() を最初のタップで呼ぶ。

let AC = null, master = null, sfxGain = null, bgmGain = null, audioReady = false, muted = false, sfxVolume = 0.8, bgmVolume = 0.35;

function initAudioOnce() {
  if (audioReady) { if (AC && AC.state === 'suspended') AC.resume(); return; }
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
  master = AC.createGain(); master.gain.value = muted ? 0 : 0.9; master.connect(AC.destination);
  sfxGain = AC.createGain(); sfxGain.gain.value = sfxVolume; sfxGain.connect(master);
  bgmGain = AC.createGain(); bgmGain.gain.value = bgmVolume; bgmGain.connect(master);
  audioReady = true;
  // 無音を一発鳴らしてアンロックを確実に
  try { const b = AC.createBufferSource(); b.buffer = AC.createBuffer(1, 1, AC.sampleRate); b.connect(master); b.start(0); } catch (_) {}
  if (_bgmWanted) startBgm();
}

function blip(o) {
  if (!audioReady) return;
  const t0 = AC.currentTime + (o.when || 0), dur = o.dur || 0.1;
  const osc = AC.createOscillator(), g = AC.createGain();
  osc.type = o.type || 'square';
  osc.frequency.setValueAtTime(o.f0 || 440, t0);
  if (o.f1 && o.f1 !== o.f0) osc.frequency.exponentialRampToValueAtTime(Math.max(1, o.f1), t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(o.vol || 0.3, t0 + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g); g.connect(sfxGain); osc.start(t0); osc.stop(t0 + dur + 0.03);
}
function seq(notes, type, vol) { let w = 0; for (const n of notes) { blip({ type: type || 'square', f0: n[0], f1: n[0], dur: n[1] * 0.92, vol: vol || 0.26, when: w }); w += n[1]; } }

// 共通演出音（仕様§4）
const sfxTap = () => blip({ type: 'square', f0: 520, f1: 660, dur: 0.07, vol: 0.18 });     // ボタン
const sfxCorrect = () => seq([[784, 0.09], [1047, 0.16]], 'square', 0.26);                  // ピンポン♪
const sfxWrong = () => blip({ type: 'square', f0: 300, f1: 220, dur: 0.12, vol: 0.16 });    // 控えめ「ん?」
const sfxSparkle = () => seq([[1047, 0.05], [1319, 0.05], [1568, 0.1]], 'triangle', 0.2);   // キラキラ
const sfxHatch = () => seq([[523, 0.1], [659, 0.1], [784, 0.1], [1047, 0.22]], 'square', 0.26); // 孵化

function toggleMute() { muted = !muted; if (master) master.gain.value = muted ? 0 : 0.9; return muted; }
function isMuted() { return muted; }
function setSfxVolume(v) { sfxVolume = Math.max(0, Math.min(1, v)); if (sfxGain) sfxGain.gain.value = sfxVolume; }

// ===== BGM（合成音・シーン別ループ。音源ファイル不要）=====
// setBgmTrack(name) でトラック切替（曲中でも次の拍から自然に切り替わる）。
// 各トラック: beat=1拍の秒数, bars=4小節（bass基音＋拍ごとのメロディ）, drums=キック/ハット, stab=裏拍の和音スタブ(ポップ感)。
let _bgmWanted = false, _bgmTimer = null, _bgmNextTime = 0, _bgmStep = 0, _bgmTrack = 'home';
const _BGM_TRACKS = {
  // ホーム：やさしい C-G-Am-F（従来曲）
  home: { beat: 0.5, drums: false, stab: false, mvol: 0.06, bars: [
    { bass: 130.81, mel: [523.25, 659.25, 783.99] },
    { bass: 196.00, mel: [587.33, 783.99, 587.33] },
    { bass: 220.00, mel: [523.25, 659.25, 880.00] },
    { bass: 174.61, mel: [698.46, 523.25, 659.25] },
  ] },
  // タイトル：あかるいファンファーレ調
  title: { beat: 0.42, drums: true, stab: false, mvol: 0.07, bars: [

function _bgmNote(freq, t0, dur, vol, type) {
  const osc = AC.createOscillator(), g = AC.createGain();
  osc.type = type || 'triangle';
  osc.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.04);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g); g.connect(bgmGain); osc.start(t0); osc.stop(t0 + dur + 0.05);
}

// キック：サイン波の急降下（150→45Hz）。ポップ/冒険トラックの土台。
function _bgmKick(t0) {
  const osc = AC.createOscillator(), g = AC.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(150, t0);
  osc.frequency.exponentialRampToValueAtTime(45, t0 + 0.11);
  g.gain.setValueAtTime(0.22, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.13);
  osc.connect(g); g.connect(bgmGain); osc.start(t0); osc.stop(t0 + 0.16);
}

// ハット：短いノイズ（バッファは初回生成して使い回し）
let _noiseBuf = null;
function _bgmHat(t0, vol) {
  try {
    if (!_noiseBuf) {
      const len = Math.max(1, Math.floor(AC.sampleRate * 0.05));
      _noiseBuf = AC.createBuffer(1, len, AC.sampleRate);
      const ch = _noiseBuf.getChannelData(0);
      for (let i = 0; i < ch.length; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / ch.length);
    }
    const src = AC.createBufferSource(); src.buffer = _noiseBuf;
    const g = AC.createGain();
    g.gain.setValueAtTime(vol || 0.05, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.05);
    src.connect(g); g.connect(bgmGain); src.start(t0); src.stop(t0 + 0.06);
  } catch (_) {}
}

// 先読みスケジューラ：タイマーで少し先の音を予約し続ける（タブが裏でも破綻しにくい）
function _bgmSchedule() {
  if (!audioReady || !_bgmWanted) return;
  const ahead = 0.7;
  while (_bgmNextTime < AC.currentTime + ahead) {
    const tr = _BGM_TRACKS[_bgmTrack] || _BGM_TRACKS.home;
    const BEAT = tr.beat;
    const bar = tr.bars[Math.floor(_bgmStep / 4) % tr.bars.length];
    const beatInBar = _bgmStep % 4;
    if (beatInBar === 0) _bgmNote(bar.bass, _bgmNextTime, BEAT * 3.6, 0.15, 'triangle');
    if (beatInBar === 0 || beatInBar === 2) _bgmNote(bar.bass * 2, _bgmNextTime, BEAT * 0.9, 0.045, 'sine');
    // メロディ：拍ごと（トラックのmel配列を循環）
    const note = bar.mel[beatInBar % bar.mel.length];
    if (note) _bgmNote(note, _bgmNextTime, BEAT * 1.05, tr.mvol, 'triangle');
    // 裏拍スタブ（ポップ）：和音の5度/オクターブを裏で短く
    if (tr.stab) {
      _bgmNote(bar.bass * 3, _bgmNextTime + BEAT * 0.5, BEAT * 0.28, 0.035, 'square');
      _bgmNote(bar.bass * 4, _bgmNextTime + BEAT * 0.5, BEAT * 0.28, 0.025, 'square');
    }
    // ドラム
    if (tr.drums) {
      if (beatInBar === 0 || beatInBar === 2) _bgmKick(_bgmNextTime);
      _bgmHat(_bgmNextTime + (tr.stab ? BEAT * 0.5 : 0), 0.045);
    }
    _bgmNextTime += BEAT;
    _bgmStep++;
  }
  _bgmTimer = setTimeout(_bgmSchedule, 200);
}

function startBgm() {
  _bgmWanted = true;
  if (!audioReady) return;   // アンロック後に initAudioOnce から再度呼ばれる
  if (_bgmTimer) return;     // 既に鳴っている
  _bgmNextTime = AC.currentTime + 0.1; _bgmStep = 0;
  _bgmSchedule();
}
function stopBgm() { _bgmWanted = false; if (_bgmTimer) { clearTimeout(_bgmTimer); _bgmTimer = null; } }
function isBgmOn() { return _bgmWanted; }
function setBgmVolume(v) { bgmVolume = Math.max(0, Math.min(1, v)); if (bgmGain) bgmGain.gain.value = bgmVolume; }
function getBgmVolume() { return bgmVolume; }
// トラック切替：曲中でも次の拍から新トラックに（stepを0に戻し小節頭から）
function setBgmTrack(name) { if (_BGM_TRACKS[name] && _bgmTrack !== name) { _bgmTrack = name; _bgmStep = 0; } }

/* ===== core/speech.js ===== */
// core/speech.js — Web Speech API (speechSynthesis) ラッパ。ja-JP・rate≈0.95。
// voiceMode:"tts"|"file" の器を最初から用意（将来は録音音声へ差し替え・仕様§8.5）。
// dash には無い mojisaurus 独自モジュール。音声アンロックは title のタップで primeSpeech()。

const speech = { mode: 'tts', rate: VOICE_RATE, ready: false, voice: null, enabled: true };

function synth() { return (typeof window !== 'undefined' && window.speechSynthesis) || null; }

function pickVoice() {
  const s = synth(); if (!s) return null;
  const vs = s.getVoices() || [];
  // ja-JP を優先、無ければ ja を含むもの
  speech.voice = vs.find(v => v.lang === 'ja-JP') || vs.find(v => (v.lang || '').toLowerCase().startsWith('ja')) || null;
  return speech.voice;
}

// 初回ユーザー操作で呼ぶ：空発話でエンジンを起こし、ボイス一覧を取得。
function primeSpeech() {
  const s = synth(); if (!s) return;
  try {
    if (s.onvoiceschanged === null) s.onvoiceschanged = pickVoice;
    pickVoice();
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0; u.lang = 'ja-JP';
    s.speak(u);
    speech.ready = true;
  } catch (_) {}
}

// text を読み上げ。将来 file モードでは録音音声を鳴らす分岐に差し替える。
function speak(text, o = {}) {
  if (!speech.enabled || !text) return;
  if (speech.mode === 'file') { /* TODO(Batch将来): assets/audio/voice/ を再生 */ return; }
  const s = synth(); if (!s) return;
  try {
    if (o.interrupt !== false) s.cancel();
    const u = new SpeechSynthesisUtterance(String(text));
    u.lang = 'ja-JP';
    u.rate = o.rate || speech.rate;
    u.pitch = o.pitch || 1.05;
    if (!speech.voice) pickVoice();
    if (speech.voice) u.voice = speech.voice;
    s.speak(u);
  } catch (_) {}
}

function setVoiceMode(mode) { speech.mode = (mode === 'file') ? 'file' : 'tts'; }
function setSpeechEnabled(on) { speech.enabled = !!on; if (!on) { const s = synth(); if (s) s.cancel(); } }

// core/storage.js — localStorage への JSON 保存/読込。version つき・破損時は初期化（仕様§8.6）。

function makeDefault() {
  return {
    version: SAVE_VERSION,
    stars: 0,
    eggProgress: 0,
    collection: { dino: [], insect: [], ghost: [] },
    mastery: {},
    settings: { bgmOn: true, bgmVolume: 0.35, sfxVolume: 0.8, voiceMode: 'tts', sessionLength: 4, kanaNameDisplay: 'katakana' },
    lastPlayed: null,
  };
}

function ls() { try { return (typeof window !== 'undefined' && window.localStorage) || null; } catch (_) { return null; } }

function loadSave() {
  const store = ls(); if (!store) return makeDefault();
  let raw = null; try { raw = store.getItem(SAVE_KEY); } catch (_) { return makeDefault(); }
  if (!raw) return makeDefault();
  try {
    const data = JSON.parse(raw);
    if (!data || typeof data !== 'object' || data.version !== SAVE_VERSION) return makeDefault();
    // 既定値に浅くマージ（キー欠落に強く）
    const def = makeDefault();
    return { ...def, ...data, settings: { ...def.settings, ...(data.settings || {}) }, collection: { ...def.collection, ...(data.collection || {}) } };
  } catch (_) { return makeDefault(); }
}

function writeSave(obj) {
  const store = ls(); if (!store) return false;
  try { obj.lastPlayed = new Date().toISOString(); store.setItem(SAVE_KEY, JSON.stringify(obj)); return true; } catch (_) { return false; }
}

function updateSave(patch) { const s = loadSave(); const next = { ...s, ...patch }; writeSave(next); return next; }

function resetSave() { const store = ls(); try { if (store) store.removeItem(SAVE_KEY); } catch (_) {} return makeDefault(); }

// core/assets.js — 画像アセットの登録/遅延読込。画像が用意されていない ID は絵文字で代替（安全なフォールバック）。
// 画像は assets/images/ 配下に置き、ID→パスを IMAGE_SRC で対応づける。
// dev(ESM)/single-file(build) どちらでも、HTML からの相対パス 'assets/images/xxx.png' で解決される。
// ※ 単一ファイル配布(index.html)でも、画像は別ファイル参照（リポジトリ同梱）。GitHub Pages 前提。

const EMOJI = {
  egg: '🥚', dino: '🦖', insect: '🐛', ghost: '👻',
  ari: '🐜', ringo: '🍎', densha: '🚃', star: '⭐',
  // 単語カード用の絵文字フォールバック（画像が来るまでの暫定表示）
  shika: '🦌', kuma: '🐻', koara: '🐨', inu: '🐶',
};

// ID → 画像パス。ここに載っているIDは画像を試み、失敗時は呼び出し側指定の絵文字（無指定ならEMOJI）にフォールバック。
// 画像未生成のうちは空にしておけば全て絵文字表示のまま安全に動く。
// 単語カードの ID は "{hiragana|katakana}_{かなのローマ字}" の複合キー（例: hiragana_shi, katakana_a）。
// 実ファイルは assets/images/words/{hiragana|katakana}/{ローマ字}.png に対応。
const IMAGE_SRC = {
  // 例（画像を用意したらコメントアウトを外す）：
  // hiragana_shi: 'assets/images/words/hiragana/shi.png',
  // hiragana_ku:  'assets/images/words/hiragana/ku.png',
  // hiragana_ko:  'assets/images/words/hiragana/ko.png',
  // hiragana_i:   'assets/images/words/hiragana/i.png',
};

const assets = { images: {}, ready: false };

// 画像を並行プリロード。読めたものだけ assets.images[id] に HTMLImageElement を格納。
// 失敗しても reject しない（フォールバックするだけ）＝1枚壊れても全体は動く。
function loadAssets() {
  const ids = Object.keys(IMAGE_SRC);
  if (typeof Image === 'undefined' || ids.length === 0) { assets.ready = true; return Promise.resolve(assets); }
  return Promise.all(ids.map(id => new Promise((resolve) => {
    const img = new Image();
    img.onload = () => { assets.images[id] = img; resolve(); };
    img.onerror = () => { resolve(); };  // 失敗は握りつぶす（絵文字フォールバック）
    img.src = IMAGE_SRC[id];
  }))).then(() => { assets.ready = true; return assets; });
}

function getImage(id) { return assets.images[id] || null; }
function hasImage(id) { return !!assets.images[id]; }
function getEmoji(id) { return EMOJI[id] || '❓'; }

// 画像優先・絵文字フォールバックでキャンバスに「絵」を描く共通ヘルパ。
// cx,cy=中心, size=表示させたい一辺の目安(px)。画像はアスペクト比維持で size に収める。
function drawIcon(ctx, id, cx, cy, size, fallbackEmoji) {
  const img = getImage(id);
  if (img && img.width && img.height) {
    const scale = size / Math.max(img.width, img.height);
    const w = img.width * scale, h = img.height * scale;
    ctx.drawImage(img, cx - w / 2, cy - h / 2, w, h);
    return true;
  }
  ctx.save();
  ctx.font = `${Math.round(size)}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(fallbackEmoji || getEmoji(id), cx, cy);
  ctx.restore();
  return false;
}

// ui/button.js — 再利用可能な角丸ボタン。矩形＋ラベル＋押下演出＋ヒットテストを1つにまとめる。
// 描画は core/canvas.js の pill() に委譲（見た目の一貫性を1箇所に集約）。

class Button {
  constructor(o = {}) {
    this.x = o.x || 0; this.y = o.y || 0; this.w = o.w || 200; this.h = o.h || 72;
    this.label = o.label || ''; this.fill = o.fill || '#57c06a'; this.top = o.top || '#8fe19a';
    this.labelColor = o.labelColor || '#ffffff'; this.labelSize = o.labelSize || 30;
    this.radius = o.radius; this.disabled = !!o.disabled; this.onTap = o.onTap || null;
    this._pressed = false;
  }
  setRect(x, y, w, h) { this.x = x; this.y = y; if (w != null) this.w = w; if (h != null) this.h = h; return this; }
  hitTest(x, y) { return !this.disabled && pointInRect(x, y, this); }
  press() { if (!this.disabled) this._pressed = true; }
  release() { this._pressed = false; }
  // ヒット→押下演出→(遅延後)コールバック、を一括で行うヘルパ。各シーンの定型処理を削減。
  tap(delayMs = 120) {
    this.press();
    const cb = this.onTap;
    setTimeout(() => { this.release(); if (cb) cb(); }, delayMs);
  }
  render() {
    pill(this, { fill: this.fill, top: this.top, label: this.label, labelSize: this.labelSize, labelColor: this.labelColor, pressed: this._pressed, radius: this.radius });
  }
}

// ui/gao.js — ナビキャラ「ガオ」の再利用ウィジェット。待機ボブ＋ムード切替（一定時間で normal に自動復帰）。

class Gao {
  constructor(o = {}) {
    this.x = o.x || 0; this.y = o.y || 0; this.size = o.size || 60;
    this.mood = o.mood || 'normal'; this.t = 0;
    this.bobSpeed = o.bobSpeed ?? 2.4; this.bobAmp = o.bobAmp ?? 6;
    this._moodUntil = 0;
  }
  setMood(mood, holdSeconds) { this.mood = mood; this._moodUntil = holdSeconds ? this.t + holdSeconds : 0; }
  update(dt) { this.t += dt; if (this._moodUntil && this.t > this._moodUntil) { this.mood = 'normal'; this._moodUntil = 0; } }
  render() { const bob = Math.sin(this.t * this.bobSpeed) * this.bobAmp; drawGao(this.x, this.y + bob, this.size, this.mood); }
}

/* ===== ui/star-fx.js ===== */
// ui/star-fx.js — 正解演出「星が飛ぶ」。spawn位置→着地位置へ弧を描いて飛び、
// 到達ごとに onArrive を呼ぶ（星カウント/たまごゲージへの加算は呼び出し側＝シーンが行う）。

class StarField {
  constructor() { this.stars = []; }
  get isEmpty() { return this.stars.length === 0; }
  spawn(fromX, fromY, toX, toY, o = {}) {
    const count = o.count || 1;
    for (let i = 0; i < count; i++) {
      const delay = (o.stagger ?? 0.08) * i;
      this.stars.push({
        fromX, fromY, toX, toY, t: -delay, dur: o.duration || 0.65,
        arc: o.arc ?? (40 + Math.random() * 30),
        rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() > 0.5 ? 1 : -1) * (3 + Math.random() * 2),
        size: o.size || 20, onArrive: o.onArrive || null, done: false,
      });
    }
  }
  update(dt) {
    for (const s of this.stars) {
      if (s.done) continue;
      s.t += dt;
      if (s.t >= s.dur && !s._fired) { s._fired = true; if (s.onArrive) s.onArrive(); }
      if (s.t >= s.dur + 0.05) s.done = true;
    }
    if (this.stars.some(s => s.done)) this.stars = this.stars.filter(s => !s.done);
  }
  render() {
    for (const s of this.stars) {
      if (s.t < 0) continue;
      const p = Math.max(0, Math.min(1, s.t / s.dur));
      const ease = 1 - Math.pow(1 - p, 3);
      const x = s.fromX + (s.toX - s.fromX) * ease;
      const y = s.fromY + (s.toY - s.fromY) * ease - Math.sin(p * Math.PI) * s.arc;
      const scale = 1 - 0.35 * ease;
      ctx.save(); ctx.translate(x, y); ctx.rotate(s.rot + s.rotSpeed * s.t); ctx.scale(scale, scale);
      drawStar(0, 0, s.size);
      ctx.restore();
    }
  }
}

function drawStar(cx, cy, r) {
  ctx.save();
  ctx.fillStyle = '#ffc53a'; ctx.strokeStyle = 'rgba(255,255,255,0.9)'; ctx.lineWidth = Math.max(1, r * 0.08);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = (Math.PI * 2 * i) / 5 - Math.PI / 2, a2 = a1 + Math.PI / 5;
    const x1 = cx + Math.cos(a1) * r, y1 = cy + Math.sin(a1) * r;
    const x2 = cx + Math.cos(a2) * r * 0.42, y2 = cy + Math.sin(a2) * r * 0.42;
    if (i === 0) ctx.moveTo(x1, y1); else ctx.lineTo(x1, y1);
    ctx.lineTo(x2, y2);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

/* ===== ui/egg-gauge.js ===== */
// ui/egg-gauge.js — たまごゲージ（0..max）。値はイージングで滑らかに追従、満タン到達で onHatch を一度だけ発火。

class EggGauge {
  constructor(o = {}) {
    this.max = o.max || 22; this.value = o.value || 0; this.display = this.value;
    this.onHatch = o.onHatch || null; this._hatchFiredAt = -1;
  }
  setValue(v) { this.value = Math.max(0, v); }
  add(n) { this.setValue(this.value + n); }
  update(dt) {
    this.display += (this.value - this.display) * Math.min(1, dt * 6);
    if (Math.abs(this.value - this.display) < 0.02) this.display = this.value;
    if (this.value >= this.max && this.display >= this.max - 0.05 && this._hatchFiredAt !== this.value) {
      this._hatchFiredAt = this.value; if (this.onHatch) this.onHatch();
    }
  }
  render(x, y, w, h) {
    const p = Math.max(0, Math.min(1, this.display / this.max));
    ctx.fillStyle = 'rgba(255,255,255,0.85)'; rrPath(x, y, w, h, h / 2); ctx.fill();
    ctx.fillStyle = COLORS.accent; rrPath(x + 3, y + 3, Math.max(0, (w - 6) * p), h - 6, (h - 6) / 2); ctx.fill();
    label('🥚', x + w + 22, y + h / 2, { size: h * 1.3 });
  }
}

/* ===== games/w1-nazori-hira.js ===== */
// games/w1-nazori-hira.js — 【W1】なぞりがき・ひらがな（仕様§4 Pillar A、判定は§7）。
// GameBase契約を実装。手書き文字認識はしない＝「順番通りになぞれたか」だけを見る（§7-7）。

const COUNT_WORDS = ['いち', 'に', 'さん', 'よん', 'ご', 'ろく'];
const SCREEN_SPACING = 9;      // なぞり判定点の画面上の間隔(px)
const DEMO_PX_PER_SEC = 170;   // 手本アニメの描画速度の目安

// path-space の d文字列 → 画面座標のポリライン（累積距離つき）に変換。
function buildScreenPoly(d, scale, offsetX, offsetY) {
  const flat = flattenCommands(parsePathD(d), 26).map(p => ({ x: offsetX + p.x * scale, y: offsetY + p.y * scale }));
  return withLengths(flat);
}
function evenPoints(poly, spacing) {
  const n = Math.max(2, Math.round(poly.total / spacing));
  const pts = []; for (let i = 0; i <= n; i++) pts.push(pointAtLength(poly, (i / n) * poly.total));
  return pts;
}
// 累積距離 upToLen までの部分ポリライン（手本アニメの「描かれている途中」表現用）。
function partialPoints(poly, upToLen) {
  const out = [];
  for (let i = 0; i < poly.pts.length; i++) { if (poly.acc[i] <= upToLen) out.push(poly.pts[i]); else break; }
  out.push(pointAtLength(poly, upToLen));
  return out;
}

class W1NazoriHira extends GameBase {
  init(ctx, services, params, question) {
    this.services = services || {};
    this.kana = question.kana;
    const { w, h } = parseViewBox(question.viewBox, 100);
    const boxSize = params.boxSize || 220;
    const scale = boxSize / Math.max(w, h);
    const offsetX = (params.centerX || 0) - (w * scale) / 2;
    const offsetY = (params.centerY || 0) - (h * scale) / 2;

    this.strokes = (question.data.strokes || []).map((d) => {
      const poly = buildScreenPoly(d, scale, offsetX, offsetY);
      return { poly, points: evenPoints(poly, SCREEN_SPACING), duration: Math.max(0.9, Math.min(1.3, poly.total / DEMO_PX_PER_SEC)) };
    });

    this.R = params.toleranceR || 26;
    this.strokeIndex = 0; this.cursor = 0; this.trail = [];
    this.mistakes = 0; this._strayCount = 0; this.tracing = false;
    this.state = 'demo'; this.demoT = 0; this._demoStarted = false;
    this._introDur = 1.9;   // 「し」「と かくよ」を言い切る音声時間。この間は手本アニメを待機（音声とアニメの直列化）
    // 文字の音を強調：まず「し」だけをはっきり、続けて「と かくよ」を（前の発話を止めずに）繋げる
    this._speak(this.kana);
    this._speak('と かくよ', { interrupt: false });
  }

  _speak(text, o) { if (this.services.speech && this.services.speech.speak) this.services.speech.speak(text, o); }
  _sfx(name) { const a = this.services.audio; if (a && typeof a[name] === 'function') a[name](); }
  _speakStrokeStart() { this._speak(COUNT_WORDS[this.strokeIndex] || 'つぎ'); }

  update(dt) {
    if (this.state !== 'demo') return;
    const s = this.strokes[this.strokeIndex]; if (!s) return;
    this.demoT += dt;
    if (!this._demoStarted) {
      if (this.demoT < this._introDur) return;   // イントロ中：読み上げを言い切るまでアニメ待機
      this._demoStarted = true; this.demoT = 0;
      this._speakStrokeStart();                   // 「いち」（割り込み＝直前音声の残りがあっても被らない）
      return;
    }
    if (this.demoT >= s.duration) {
      this.strokeIndex++;
      if (this.strokeIndex >= this.strokes.length) {
        this.state = 'trace'; this.strokeIndex = 0; this.cursor = 0; this.trail = [];
        this._speak(this.kana);                                   // なぞる直前にもう一度この字を読み上げ
        this._speak('を なぞってみよう', { interrupt: false });
      } else { this.demoT = 0; this._speakStrokeStart(); }
    }
  }

  render(ctx) {
    // 全画のうすいガイド
    ctx.save(); ctx.strokeStyle = 'rgba(43,58,103,0.18)'; ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (const s of this.strokes) this._strokePath(ctx, s.poly.pts);
    ctx.restore();

    if (this.state === 'demo') {
      for (let i = 0; i < this.strokeIndex; i++) this._drawDone(ctx, this.strokes[i]);
      const cur = this.strokes[this.strokeIndex];
      if (cur && !this._demoStarted) {
        // イントロ中：1画目の開始点をやさしく点滅させて待つ（アニメはまだ）
        const p0 = cur.poly.pts[0];
        const a = 0.5 + 0.5 * Math.sin(this.demoT * 5);
        ctx.save(); ctx.fillStyle = `rgba(255,138,92,${(0.4 + 0.5 * a).toFixed(2)})`;
        ctx.beginPath(); ctx.arc(p0.x, p0.y, 13, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      } else if (cur) {
        const upTo = (this.demoT / cur.duration) * cur.poly.total;
        const pts = partialPoints(cur.poly, upTo);
        ctx.save(); ctx.strokeStyle = '#ff8a5c'; ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        this._strokePath(ctx, pts); ctx.restore();
        const tip = pts[pts.length - 1];
        if (tip) this._drawFinger(ctx, tip.x, tip.y);
      }
    } else if (this.state === 'trace') {
      for (let i = 0; i < this.strokeIndex; i++) this._drawDone(ctx, this.strokes[i]);
      const cur = this.strokes[this.strokeIndex];
      if (cur) {
        ctx.save(); ctx.setLineDash([14, 10]); ctx.strokeStyle = 'rgba(87,192,106,0.9)'; ctx.lineWidth = 11; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        this._strokePath(ctx, cur.points); ctx.restore();
        if (this.trail.length > 1) { ctx.save(); ctx.strokeStyle = '#2b8f43'; ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; this._strokePath(ctx, this.trail); ctx.restore(); }
        const target = cur.points[Math.min(this.cursor, cur.points.length - 1)];
        ctx.save(); ctx.fillStyle = 'rgba(255,197,58,0.9)'; ctx.beginPath(); ctx.arc(target.x, target.y, 12, 0, Math.PI * 2); ctx.fill(); ctx.restore();
      }
    } else if (this.state === 'complete') {
      for (const s of this.strokes) this._drawDone(ctx, s);
    }
  }

  _strokePath(ctx, pts) { if (pts.length < 2) return; ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y); ctx.stroke(); }
  _drawDone(ctx, s) { ctx.save(); ctx.strokeStyle = '#57c06a'; ctx.lineWidth = 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; this._strokePath(ctx, s.poly.pts); ctx.restore(); }
  _drawFinger(ctx, x, y) { ctx.save(); ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.strokeStyle = '#2b3a67'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2); ctx.fill(); ctx.stroke(); ctx.restore(); }

  onPointerDown(x, y) {
    if (this.state === 'demo') { this.state = 'trace'; this.strokeIndex = 0; this.cursor = 0; this.trail = []; this._speak(this.kana); this._speak('を なぞってみよう', { interrupt: false }); }
    if (this.state !== 'trace') return;
    this.tracing = true; this.trail = [{ x, y }];
    this._advanceCursor(x, y);
  }
  onPointerMove(x, y) {
    if (this.state !== 'trace' || !this.tracing) return;
    this.trail.push({ x, y }); if (this.trail.length > 400) this.trail.shift();
    this._advanceCursor(x, y);
  }
  onPointerUp() { this.tracing = false; }

  _advanceCursor(x, y) {
    const s = this.strokes[this.strokeIndex]; if (!s) return;
    const pts = s.points;
    const startR = this.R * 1.6, R = this.R, bigMissR = this.R * 3.5;
    while (this.cursor < pts.length - 1) {
      const targetR = this.cursor === 0 ? startR : R;
      if (Math.hypot(x - pts[this.cursor].x, y - pts[this.cursor].y) <= targetR) this.cursor++; else break;
    }
    const cIdx = Math.min(this.cursor, pts.length - 1);
    const dCur = Math.hypot(x - pts[cIdx].x, y - pts[cIdx].y);
    this._strayCount = (dCur > bigMissR) ? (this._strayCount + 1) : 0;
    if (this._strayCount > 18) {
      this._strayCount = 0; this.cursor = 0; this.trail = []; this.mistakes++;
      this._speak('もういちど、じゅんばんに なぞってね');
      return;
    }
    if (this.cursor >= pts.length - 1) {
      this.strokeIndex++; this.cursor = 0; this.trail = [];
      if (this.strokeIndex >= this.strokes.length) { this.state = 'complete'; this._sfx('sfxSparkle'); }
      else this._sfx('sfxTap');
    }
  }

  isComplete() { return this.state === 'complete'; }
  getResult() { return { correctCount: 1, mistakes: this.mistakes, itemsPracticed: [this.kana] }; }
  dispose() {}
}

/* ===== games/l1-shiritori.js ===== */
// games/l1-shiritori.js — 【L1】しりとり（仕様§4 Pillar D）。ガオと交互に語をつなぐ。ひらがな/カタカナ両対応。
// ・直前の語の最後の音で始まる語カード（3択）から選ぶ。ん(ン)終わり語はトラップ（選ぶと優しく無効・§L1）
// ・長音ー終わりは直前の母音で接続、濁点/半濁点は清音扱いで緩く判定（子ども向けに繋がりやすく）
// ・チェーンは init 時に15回試行して最長を採用（辞書検証で5ターンぶん=11語以上が100%確保できることを確認済み）
// ・ガオの返答は update(dt) 駆動のフェーズ機械（setTimeout不使用＝ヘッドレステストで決定的に進められる）

// 濁点・半濁点→清音（しりとり接続を緩くする）。ひらがな・カタカナ両方。
const DAKU_TO_SEI = {
  'が':'か','ぎ':'き','ぐ':'く','げ':'け','ご':'こ','ざ':'さ','じ':'し','ず':'す','ぜ':'せ','ぞ':'そ','だ':'た','ぢ':'ち','づ':'つ','で':'て','ど':'と','ば':'は','び':'ひ','ぶ':'ふ','べ':'へ','ぼ':'ほ','ぱ':'は','ぴ':'ひ','ぷ':'ふ','ぺ':'へ','ぽ':'ほ',
  'ガ':'カ','ギ':'キ','グ':'ク','ゲ':'ケ','ゴ':'コ','ザ':'サ','ジ':'シ','ズ':'ス','ゼ':'セ','ゾ':'ソ','ダ':'タ','ヂ':'チ','ヅ':'ツ','デ':'テ','ド':'ト','バ':'ハ','ビ':'ヒ','ブ':'フ','ベ':'ヘ','ボ':'ホ','パ':'ハ','ピ':'ヒ','プ':'フ','ペ':'ヘ','ポ':'ホ',
};
// カタカナ長音ー用：直前の文字→母音（ひらがな母音で返しても比較は後述のnormで吸収）
const VOWEL = {};
(() => {
  const rows = { 'ア':'アカサタナハマヤラワガザダバパ', 'イ':'イキシチニヒミリギジヂビピ', 'ウ':'ウクスツヌフムユルグズブプ', 'エ':'エケセテネヘメレゲゼデベペ', 'オ':'オコソトノホモヨロゴゾドボポ' };
  for (const [v, chars] of Object.entries(rows)) for (const c of chars) VOWEL[c] = v;
})();

const norm = ch => DAKU_TO_SEI[ch] || ch;
const firstMora = w => norm(w[0]);
function lastMora(w) {
  const last = w[w.length - 1];
  if (last === 'ー') { const prev = w[w.length - 2]; return VOWEL[prev] || norm(prev); }
  return norm(last);
}
const endsN = w => { const l = w[w.length - 1]; return l === 'ん' || l === 'ン'; };
const shiriOk = w => !SHIRI_BAD_END.includes(w[w.length - 1]);

function poolFor(mode) { return mode === 'katakana' ? VOCAB_KATA : VOCAB_HIRA; }

function buildChain(pool, turns) {
  const need = turns * 2 + 1;
  let best = null;
  for (let attempt = 0; attempt < 15; attempt++) {
    const usable = pool.filter(x => shiriOk(x.w) && !endsN(x.w));
    let cur = usable[Math.floor(Math.random() * usable.length)];
    const chain = [cur]; const used = new Set([cur.w]);
    while (chain.length < need) {
      let cands = pool.filter(y => !used.has(y.w) && shiriOk(y.w) && !endsN(y.w) && firstMora(y.w) === lastMora(cur.w));
      const withNext = cands.filter(y => pool.some(z => !used.has(z.w) && z.w !== y.w && shiriOk(z.w) && !endsN(z.w) && firstMora(z.w) === lastMora(y.w)));
      if (withNext.length) cands = withNext;
      if (!cands.length) break;
      cur = cands[Math.floor(Math.random() * cands.length)];
      chain.push(cur); used.add(cur.w);
    }
    if (!best || chain.length > best.length) best = chain;
    if (best.length >= need) break;
  }
  return best;
}

function pickDistractors(pool, correct, requiredMora, count) {
  const out = [];
  const traps = pool.filter(y => endsN(y.w) && firstMora(y.w) === requiredMora && y.w !== correct.w);
  if (traps.length && Math.random() < 0.45) out.push({ ...traps[Math.floor(Math.random() * traps.length)], trap: true });
  const wrongs = pool.filter(y => firstMora(y.w) !== requiredMora && y.w !== correct.w);
  while (out.length < count && wrongs.length) out.push(wrongs.splice(Math.floor(Math.random() * wrongs.length), 1)[0]);
  return out;
}

class L1Shiritori extends GameBase {
  init(ctx2, services, params, question) {
    this.services = services || {};
    this.turns = (params && params.turns) || 5;
    this.pool = poolFor(params && params.kanaMode);
    this.chain = buildChain(this.pool, this.turns);
    this.chainIdx = 0;
    this.turnsDone = 0; this.mistakes = 0; this._missesThisTurn = 0;
    this.itemsPracticed = [];
    this.phase = 'gaoSay'; this.phaseT = 0;
    this.cards = []; this._effect = null;
    this._sayCurrent();
  }

  _speak(t, o) { const s = this.services.speech; if (s && s.speak) s.speak(t, o); }
  _sfx(n) { const a = this.services.audio; if (a && typeof a[n] === 'function') a[n](); }
  _cur() { return this.chain[this.chainIdx]; }
  _sayCurrent() { this._speak(this._cur().w); }

  _makeCards() {
    const correct = this.chain[this.chainIdx + 1];
    const req = lastMora(this._cur().w);
    const list = [{ ...correct, correct: true }, ...pickDistractors(this.pool, correct, req, 2)];
    for (let i = list.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [list[i], list[j]] = [list[j], list[i]]; }
    this.cards = list;
  }

  update(dt) {
    this.phaseT += dt;
    if (this._effect) { this._effect.t += dt; if (this._effect.t > 0.7) this._effect = null; }
    if (this.phase === 'gaoSay' && this.phaseT > 0.9) {
      if (this.turnsDone >= this.turns || this.chainIdx + 1 >= this.chain.length) { this.phase = 'done'; this._sfx('sfxSparkle'); this._speak('しりとり だいせいこう！'); return; }
      this._makeCards(); this._missesThisTurn = 0;
      this.phase = 'choose'; this.phaseT = 0;
    } else if (this.phase === 'gaoThink' && this.phaseT > 0.8) {
      this.chainIdx++;
      this.phase = 'gaoSay'; this.phaseT = 0;
      this._sayCurrent();
    }
  }

  _layout() {
    const W = view.w, H = view.h;
    const cardW = Math.min(W * 0.29, 240), cardH = Math.min(H * 0.24, 150);
    const gap = (W - cardW * 3) / 4;
    const cy = H * 0.98 - cardH;
    return { cardW, cardH, gap, cy, W, H };
  }

  render() {
    const { cardW, cardH, gap, cy, W, H } = this._layout();
    const gx = W * 0.18, gy = H * 0.30;
    drawGao(gx, gy, Math.min(W * 0.06, 46), this.phase === 'done' ? 'happy' : 'normal');
    const cur = this._cur();
    const bw = Math.min(W * 0.5, 380), bh = Math.min(H * 0.22, 130), bx = gx + W * 0.08, by = gy - bh / 2;
    ctx.save(); ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.strokeStyle = '#5cc8ff'; ctx.lineWidth = 4;
    rrPath(bx, by, bw, bh, 22); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx + 2, by + bh * 0.55); ctx.lineTo(bx - 16, by + bh * 0.68); ctx.lineTo(bx + 2, by + bh * 0.8); ctx.closePath(); ctx.fillStyle = '#fff'; ctx.fill(); ctx.restore();
    label(cur.e, bx + bw * 0.18, by + bh * 0.5, { size: bh * 0.5 });
    label(cur.w, bx + bw * 0.6, by + bh * 0.5, { size: Math.min(bh * 0.34, bw * 0.13), color: '#2b3a67', weight: 800 });
    if (this.phase === 'choose') {
      label(`「${lastMora(cur.w)}」から はじまる ことばは？`, W / 2, H * 0.52, { size: Math.min(W * 0.038, 24), color: '#2b3a67', weight: 800 });
    } else if (this.phase === 'done') {
      label('しりとり だいせいこう！ 🎉', W / 2, H * 0.55, { size: Math.min(W * 0.05, 32), color: '#2b3a67', weight: 800 });
    }
    for (let i = 0; i < this.turns; i++) {
      const px = W / 2 + (i - (this.turns - 1) / 2) * 30;
      label(i < this.turnsDone ? '⭐' : '・', px, H * 0.09, { size: 20, color: '#2b3a67' });
    }
    if (this.phase === 'choose') {
      this._cardRects = this.cards.map((c, i) => {
        const x = gap + i * (cardW + gap);
        const fx = this._effect && this._effect.cardIdx === i ? this._effect : null;
        let dx = 0;
        if (fx && (fx.kind === 'ng' || fx.kind === 'trap')) dx = Math.sin(fx.t * 30) * 6 * Math.max(0, 1 - fx.t / 0.5);
        const r = { x: x + dx, y: cy, w: cardW, h: cardH };
        ctx.save(); ctx.fillStyle = '#ffffff'; ctx.strokeStyle = fx && fx.kind === 'ok' ? '#57c06a' : '#c9d5ea'; ctx.lineWidth = fx && fx.kind === 'ok' ? 6 : 3;
        if (this._missesThisTurn >= 2 && c.correct) { ctx.strokeStyle = '#ffc53a'; ctx.lineWidth = 6; }
        rrPath(r.x, r.y, r.w, r.h, 18); ctx.fill(); ctx.stroke(); ctx.restore();
        label(c.e, r.x + r.w / 2, r.y + r.h * 0.38, { size: r.h * 0.38 });
        label(c.w, r.x + r.w / 2, r.y + r.h * 0.78, { size: Math.min(r.h * 0.19, r.w * 0.135), color: '#2b3a67', weight: 800 });
        return r;
      });
    } else { this._cardRects = null; }
  }

  onPointerDown(x, y) {
    if (this.phase !== 'choose' || !this._cardRects) return;
    for (let i = 0; i < this._cardRects.length; i++) {
      if (!pointInRect(x, y, this._cardRects[i])) continue;
      const c = this.cards[i];
      this._speak(c.w);
      if (c.correct) {
        this._sfx('sfxCorrect');
        this._effect = { kind: 'ok', t: 0, cardIdx: i };
        this.turnsDone++; this.itemsPracticed.push(c.w);
        this.chainIdx++;
        this.phase = 'gaoThink'; this.phaseT = 0;
      } else if (c.trap) {
        this._sfx('sfxWrong');
        this._effect = { kind: 'trap', t: 0, cardIdx: i };
        this._speak('あーっ、ん が ついちゃう！', { interrupt: false });
        this.mistakes++; this._missesThisTurn++;
      } else {
        this._sfx('sfxWrong');
        this._effect = { kind: 'ng', t: 0, cardIdx: i };
        this.mistakes++; this._missesThisTurn++;
      }
      return;
    }
  }

  isComplete() { return this.phase === 'done'; }
  getResult() { return { correctCount: this.turnsDone, mistakes: this.mistakes, itemsPracticed: this.itemsPracticed }; }
  dispose() {}
}

/* ===== games/l2-nakama.js ===== */
// games/l2-nakama.js — 【L2】なかまあつめ（仕様§4 Pillar D）。カテゴリのかご2つ＋カードを順に振り分け。
// タブレットの5歳操作を考慮し、ドラッグでなく「カードを見る→正しいかごをタップ」方式（仕様の代替操作）。
// 全問正解（最後まで振り分け）で完成演出。2ミスで正解かごをそっと光らせる（§4）。

const BASKET_EMOJI = { animal: '🐾', food: '🍽️', vehicle: '🛞', insect: '🍃', nature: '🌤️', object: '🧰' };

function pickGame(baskets, cardsPerGame) {
  // カテゴリを2つ選ぶ（語数が十分あるものから）→ 各カテゴリからカードを半分ずつ
  const byCat = {};
  for (const w of VOCAB_WORDS) (byCat[w.c] = byCat[w.c] || []).push(w);
  const cats = Object.keys(byCat).filter(c => byCat[c].length >= Math.ceil(cardsPerGame / 2));
  for (let i = cats.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [cats[i], cats[j]] = [cats[j], cats[i]]; }
  const chosen = cats.slice(0, baskets);
  const per = Math.floor(cardsPerGame / baskets);
  const cards = [];
  for (const c of chosen) {
    const pool = [...byCat[c]];
    for (let k = 0; k < per; k++) cards.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  for (let i = cards.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [cards[i], cards[j]] = [cards[j], cards[i]]; }
  return { categories: chosen, cards };
}

class L2Nakama extends GameBase {
  init(ctx2, services, params) {
    this.services = services || {};
    const baskets = (params && params.baskets) || 2;
    const cardsPerGame = (params && params.cards) || 6;
    const g = pickGame(baskets, cardsPerGame);
    this.categories = g.categories; this.cards = g.cards;
    this.cardIdx = 0; this.correct = 0; this.mistakes = 0; this._missesThisCard = 0;
    this.itemsPracticed = [];
    this.done = false;
    this._fx = null;          // {kind:'ok'|'ng', t, basketIdx}
    this._cardPop = 0;        // カード登場アニメ
    this._speak('おなじ なかまの かごに いれてね');
  }

  _speak(t, o) { const s = this.services.speech; if (s && s.speak) s.speak(t, o); }
  _sfx(n) { const a = this.services.audio; if (a && typeof a[n] === 'function') a[n](); }
  _cur() { return this.cards[this.cardIdx]; }

  update(dt) {
    this._cardPop = Math.min(1, this._cardPop + dt * 4);
    if (this._fx) {
      this._fx.t += dt;
      if (this._fx.t > 0.55) {
        const wasOk = this._fx.kind === 'ok'; this._fx = null;
        if (wasOk) {
          this.cardIdx++; this._cardPop = 0; this._missesThisCard = 0;
          if (this.cardIdx >= this.cards.length) { this.done = true; this._sfx('sfxSparkle'); this._speak('ぜんぶ できた！ なかまわけ めいじんだ！'); }
          else this._speak(this._cur().w);
        }
      }
    }
  }

  _layout() {
    const W = view.w, H = view.h;
    const bw = Math.min(W * 0.36, 300), bh = Math.min(H * 0.24, 150);
    const gapX = (W - bw * this.categories.length) / (this.categories.length + 1);
    const by = H * 0.14;
    const baskets = this.categories.map((c, i) => ({ cat: c, x: gapX + i * (bw + gapX), y: by, w: bw, h: bh }));
    const cw = Math.min(W * 0.34, 260), ch = Math.min(H * 0.3, 190);
    const card = { x: (W - cw) / 2, y: H * 0.62, w: cw, h: ch };
    return { baskets, card, W, H };
  }

  render() {
    const { baskets, card, W, H } = this._layout();
    this._basketRects = baskets;
    // 進捗
    label(`${Math.min(this.cardIdx + (this.done ? 0 : 1), this.cards.length)} / ${this.cards.length} まい`, W / 2, H * 0.08, { size: 20, color: '#2b3a67', weight: 700 });
    // かご
    baskets.forEach((b, i) => {
      const fx = this._fx && this._fx.basketIdx === i ? this._fx : null;
      let dy = 0, glow = false;
      if (fx && fx.kind === 'ok') { dy = -Math.sin(Math.min(1, fx.t / 0.3) * Math.PI) * 8; glow = true; }
      let dx = 0; if (fx && fx.kind === 'ng') dx = Math.sin(fx.t * 30) * 5 * Math.max(0, 1 - fx.t / 0.5);
      ctx.save(); ctx.fillStyle = '#fff7e8'; ctx.strokeStyle = glow ? '#57c06a' : '#e0b96f'; ctx.lineWidth = glow ? 6 : 4;
      // 2ミス後は正解かごをそっと光らせる
      if (this._missesThisCard >= 2 && !this.done && this._cur() && b.cat === this._cur().c) { ctx.strokeStyle = '#ffc53a'; ctx.lineWidth = 6; }
      rrPath(b.x + dx, b.y + dy, b.w, b.h, 20); ctx.fill(); ctx.stroke(); ctx.restore();
      label(BASKET_EMOJI[b.cat] || '🧺', b.x + b.w / 2 + dx, b.y + dy + b.h * 0.36, { size: b.h * 0.34 });
      label(VOCAB_CATEGORY_LABEL[b.cat] || b.cat, b.x + b.w / 2 + dx, b.y + dy + b.h * 0.78, { size: Math.min(b.h * 0.2, b.w * 0.11), color: '#6b4e16', weight: 800 });
    });
    // 現在のカード or 完成
    if (this.done) {
      drawGao(W / 2, H * 0.66, Math.min(W * 0.08, 60), 'happy');
      label('なかまわけ かんせい！ 🎉', W / 2, H * 0.84, { size: Math.min(W * 0.05, 30), color: '#2b3a67', weight: 800 });
      this._cardRect = null;
      return;
    }
    const c = this._cur();
    const pop = 1 - Math.pow(1 - this._cardPop, 3);
    const cw = card.w * (0.7 + 0.3 * pop), ch = card.h * (0.7 + 0.3 * pop);
    const r = { x: (W - cw) / 2, y: card.y + (card.h - ch) / 2, w: cw, h: ch };
    ctx.save(); ctx.globalAlpha = pop; ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#c9d5ea'; ctx.lineWidth = 4;
    rrPath(r.x, r.y, r.w, r.h, 20); ctx.fill(); ctx.stroke(); ctx.restore();
    label(c.e, r.x + r.w / 2, r.y + r.h * 0.4, { size: r.h * 0.4 });
    label(c.w, r.x + r.w / 2, r.y + r.h * 0.8, { size: Math.min(r.h * 0.16, r.w * 0.13), color: '#2b3a67', weight: 800 });
    label('うえの かごを タップ！', W / 2, r.y - 18, { size: 16, color: 'rgba(43,58,103,0.7)', weight: 700 });
    this._cardRect = r;
  }

  onPointerDown(x, y) {
    if (this.done || this._fx || !this._basketRects) return;
    for (let i = 0; i < this._basketRects.length; i++) {
      const b = this._basketRects[i];
      if (!pointInRect(x, y, b)) continue;
      const c = this._cur();
      if (b.cat === c.c) {
        this._sfx('sfxCorrect');
        this._fx = { kind: 'ok', t: 0, basketIdx: i };
        this.correct++; this.itemsPracticed.push(c.w);
      } else {
        this._sfx('sfxWrong');
        this._fx = { kind: 'ng', t: 0, basketIdx: i };
        this.mistakes++; this._missesThisCard++;
      }
      return;
    }
  }

  isComplete() { return this.done; }
  getResult() { return { correctCount: this.correct, mistakes: this.mistakes, itemsPracticed: this.itemsPracticed }; }
  dispose() {}
}

/* ===== games/g1-anagram.js ===== */
// games/g1-anagram.js — 【G1】もじならべ（アナグラム）。絵をヒントに、シャッフルされた文字カードを
// ドラッグで入れ替えて単語を完成させる。3ラウンド制。update(dt)駆動（setTimeout不使用）。
// 操作：カードを掴んで別のスロットへドロップ→2枚が入れ替わる。全スロットが正順になったらクリア。

const ROUNDS = 3;

function pickWords() {
  // 3〜4文字の語から3つ（重複なし・4文字は最大1つ＝難度調整）
  const c3 = VOCAB_HIRA.filter(w => w.w.length === 3);
  const c4 = VOCAB_HIRA.filter(w => w.w.length === 4);
  const take = (arr) => arr.splice(Math.floor(Math.random() * arr.length), 1)[0];
  const p3 = [...c3], p4 = [...c4];
  const words = [take(p3), take(p3)];
  words.push(Math.random() < 0.5 && p4.length ? take(p4) : take(p3));
  for (let i = words.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [words[i], words[j]] = [words[j], words[i]]; }
  return words;
}

function shuffledOrder(n, avoidIdentity) {
  const idx = Array.from({ length: n }, (_, i) => i);
  do {
    for (let i = n - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [idx[i], idx[j]] = [idx[j], idx[i]]; }
  } while (avoidIdentity && idx.every((v, i) => v === i));
  return idx;
}

class G1Anagram extends GameBase {
  init(ctx2, services) {
    this.services = services || {};
    this.words = pickWords();
    this.round = 0; this.cleared = 0; this.mistakes = 0; this.itemsPracticed = [];
    this.state = 'play';           // play → roundclear → play … → done
    this._clearT = 0;
    this.drag = null;              // { slotIdx, x, y }
    this._startRound();
  }

  _speak(t, o) { const s = this.services.speech; if (s && s.speak) s.speak(t, o); }
  _sfx(n) { const a = this.services.audio; if (a && typeof a[n] === 'function') a[n](); }

  _startRound() {
    this.word = this.words[this.round];
    const chars = [...this.word.w];
    const order = shuffledOrder(chars.length, true);
    // slots[i] に入っているカードの「正解位置」を持つ（slots[i] === i で全一致ならクリア）
    this.slots = order.slice();
    this.chars = chars;
    this.drag = null;
    this._speak(`「${this.word.w}」を つくってね`);
  }

  _isSolved() { return this.slots.every((v, i) => v === i); }

  update(dt) {
    if (this.state === 'roundclear') {
      this._clearT += dt;
      if (this._clearT >= 1.4) {
        this.round++;
        if (this.round >= ROUNDS) { this.state = 'done'; this._sfx('sfxSparkle'); this._speak('もじならべ だいせいこう！'); }
        else { this.state = 'play'; this._startRound(); }
      }
    }
  }

  _layout() {
    const W = view.w, H = view.h;
    const n = this.chars ? this.chars.length : 3;
    const cw = Math.min(W * 0.18, 130, (W * 0.8) / n - 12), ch = cw;
    const gap = Math.min(W * 0.035, 24);
    const totalW = cw * n + gap * (n - 1);
    const x0 = (W - totalW) / 2, sy = H * 0.58;
    const slots = Array.from({ length: n }, (_, i) => ({ x: x0 + i * (cw + gap), y: sy, w: cw, h: ch }));
    return { slots, cw, ch, W, H };
  }

  render() {
    const { slots, cw, W, H } = this._layout();
    this._slotRects = slots;
    // ヒント絵＋ラウンド進捗
    label(`${Math.min(this.round + 1, ROUNDS)} / ${ROUNDS} もんめ`, W / 2, H * 0.14, { size: 18, color: '#2b3a67', weight: 700 });
    if (this.state === 'done') {
      label('🎉', W / 2, H * 0.4, { size: H * 0.2 });
      label('もじならべ だいせいこう！', W / 2, H * 0.62, { size: Math.min(W * 0.05, 32), color: '#2b3a67', weight: 800 });
      return;
    }
    label(this.word.e, W / 2, H * 0.33, { size: H * 0.2 });
    if (this.state === 'roundclear') {
      label(this.word.w, W / 2, H * 0.62, { size: Math.min(W * 0.09, 54), color: '#2b8f43', weight: 800, shadow: 2 });
      label('できた！', W / 2, H * 0.78, { size: 24, color: '#2b3a67', weight: 800 });
      return;
    }
    label('カードを うごかして ならべてね', W / 2, H * 0.47, { size: Math.min(W * 0.032, 19), color: 'rgba(43,58,103,0.75)', weight: 700 });
    // スロット枠＋カード（ドラッグ中のカードは最後に浮かせて描く）
    slots.forEach((s, i) => {
      ctx.save(); ctx.strokeStyle = 'rgba(43,58,103,0.25)'; ctx.setLineDash([8, 7]); ctx.lineWidth = 3;
      rrPath(s.x, s.y, s.w, s.h, 16); ctx.stroke(); ctx.restore();
      if (this.drag && this.drag.slotIdx === i) return;   // 掴んでいるカードは後で描く
      this._drawCard(this.chars[this.slots[i]], s.x, s.y, s.w, false);
    });
    if (this.drag) {
      const s = slots[this.drag.slotIdx];
      this._drawCard(this.chars[this.slots[this.drag.slotIdx]], this.drag.x - s.w / 2, this.drag.y - s.h / 2, s.w, true);
    }
  }

  _drawCard(chr, x, y, size, lifted) {
    ctx.save();
    if (lifted) { ctx.shadowColor = 'rgba(0,0,0,0.28)'; ctx.shadowBlur = 14; ctx.shadowOffsetY = 6; }
    ctx.fillStyle = '#ffffff'; ctx.strokeStyle = lifted ? '#ffc53a' : '#c9d5ea'; ctx.lineWidth = lifted ? 5 : 3;
    rrPath(x, y, size, size, 16); ctx.fill(); ctx.stroke();
    ctx.restore();
    label(chr, x + size / 2, y + size / 2, { size: size * 0.55, color: '#2b3a67', weight: 800 });
  }

  onPointerDown(x, y) {
    if (this.state !== 'play' || !this._slotRects) return;
    for (let i = 0; i < this._slotRects.length; i++) {
      const s = this._slotRects[i];
      if (x >= s.x && x <= s.x + s.w && y >= s.y && y <= s.y + s.h) {
        this.drag = { slotIdx: i, x, y };
        this._sfx('sfxTap');
        this._speak(this.chars[this.slots[i]]);
        return;
      }
    }
  }
  onPointerMove(x, y) { if (this.drag) { this.drag.x = x; this.drag.y = y; } }
  onPointerUp(x, y) {
    if (!this.drag || this.state !== 'play') { this.drag = null; return; }
    const from = this.drag.slotIdx;
    // 最も近いスロットへドロップ（カード中心距離）
    let best = -1, bestD = Infinity;
    this._slotRects.forEach((s, i) => {
      const d = Math.hypot(x - (s.x + s.w / 2), y - (s.y + s.h / 2));
      if (d < bestD) { bestD = d; best = i; }
    });
    if (best >= 0 && best !== from && bestD < this._slotRects[0].w * 1.4) {
      [this.slots[from], this.slots[best]] = [this.slots[best], this.slots[from]];
      this._sfx('sfxTap');
    }
    this.drag = null;
    if (this._isSolved()) {
      this.cleared++; this.itemsPracticed.push(this.word.w);
      this._sfx('sfxCorrect');
      this._speak(`せいかい！ ${this.word.w}！`);
      this.state = 'roundclear'; this._clearT = 0;
    }
  }

  isComplete() { return this.state === 'done'; }
  getResult() { return { correctCount: this.cleared, mistakes: this.mistakes, itemsPracticed: this.itemsPracticed }; }
  dispose() {}
}

/* ===== games/g2-maze.js ===== */
// games/g2-maze.js — 【G2】もじめいろ。ことば（2〜4文字）の字を分岐で1つずつ集めながらゴールを目指す。
// ・分岐ごとに「正しい形」vs「まちがい形（鏡文字 or にてる別の字）」。正しい方だけが先へ続く。
// ・正解ルートの字をつなぐと1つの ことば になり、ゴールで絵カード（絵文字＋単語）を披露＆読み上げ。
// ・迷路の形は毎回ランダム生成（分岐位置・上下・曲がり・袋小路の向きにジッター）＝同じパターンにならない。
// ・道はエッジグラフ（E0→F1→C1→…→Cn→GOAL、各Fkにハズレ Wk）。カーソルはW1同様の寛容な窓式追従。

const R = 30;                 // 追従許容半径
const CORRIDOR = 40;          // 道の太さ

function densify(pts, spacing = 10) {
  const out = [pts[0]];
  for (let i = 1; i < pts.length; i++) {
    const a = pts[i - 1], b = pts[i];
    const d = Math.hypot(b.x - a.x, b.y - a.y);
    const n = Math.max(1, Math.round(d / spacing));
    for (let k = 1; k <= n; k++) out.push({ x: a.x + (b.x - a.x) * k / n, y: a.y + (b.y - a.y) * k / n });
  }
  return out;
}

const rr = (a, b) => a + Math.random() * (b - a);
const SMALLS = /[っゃゅょ]/;

// お題の ことば：2〜4文字・基本かなのみ（迷路の分岐数＝文字数になる）
function pickWord() {
  const cands = VOCAB_HIRA.filter(x => x.w.length >= 2 && x.w.length <= 4 && /^[ぁ-ん]+$/.test(x.w) && !SMALLS.test(x.w));
  return cands[Math.floor(Math.random() * cands.length)];
}

// 迷路の形を毎回ランダム生成。バンド y∈[0.30,0.86]、x∈[0.07,0.90]。
// 分岐Fkから：正解枝Ck＝縦（ジッター付きレーンへ）→横で次のFk+1（最終はGOAL）、ハズレWk＝逆側レーンへ落ちて袋小路。
function buildGeometry(W, H, forks) {
  const yMin = 0.30, yMax = 0.86;
  const clampY = (v) => Math.max(yMin, Math.min(yMax, v));
  const P = (x, y) => ({ x: W * x, y: H * y });
  const edges = [];
  const forkMap = {};
  const forkOrder = [];

  const x0 = rr(0.06, 0.09);
  let fy = rr(0.45, 0.70);                       // スタートの高さもランダム
  let fx = rr(0.19, 0.24);
  edges.push({ id: 'E0', from: 'S', to: 'F1', pts: [P(x0, fy), P((x0 + fx) / 2, clampY(fy + rr(-0.06, 0.06))), P(fx, fy)] });

  const stepX = (0.90 - fx) / forks;               // 残り幅を分岐数で分割
  for (let k = 1; k <= forks; k++) {
    const fid = `F${k}`;
    forkOrder.push(fid);
    const dir = Math.random() < 0.5 ? -1 : 1;      // 正解が上か下かは毎回ランダム
    const laneC = clampY(fy + dir * rr(0.20, 0.30));
    const laneW = clampY(fy - dir * rr(0.18, 0.28));
    const nx = Math.min(0.90, fx + stepX * rr(0.85, 1.05));
    const isLast = k === forks;
    // 正解枝：縦→横（最後の分岐はGOALへ、途中に軽いジッター曲げ）
    const cPts = [P(fx, fy), P(fx, laneC)];
    if (!isLast) {
      if (Math.random() < 0.5) cPts.push(P((fx + nx) / 2, clampY(laneC + rr(-0.05, 0.05))));
      cPts.push(P(nx, laneC));
    } else {
      cPts.push(P(rr(0.86, 0.90), laneC));
    }
    edges.push({ id: `C${k}`, from: fid, to: isLast ? 'G' : `F${k + 1}`, pts: cPts, correct: true });
    // ハズレ枝：逆レーンに落ちて短い袋小路（尻尾の向きもランダム）
    const tail = rr(0.05, 0.09) * (Math.random() < 0.5 ? 1 : -1);
    edges.push({ id: `W${k}`, from: fid, to: `D${k}`, pts: [P(fx, fy), P(fx, laneW), P(Math.min(0.9, Math.max(0.08, fx + Math.abs(tail))), clampY(laneW + tail * 0.5))], correct: false });
    forkMap[fid] = { correct: `C${k}`, wrong: `W${k}` };
    fx = nx; fy = laneC;
  }
  return { edges: edges.map(e => ({ ...e, pts: densify(e.pts) })), forks: forkMap, forkOrder };
}

// ことばの各文字 → 分岐のお題（まちがい形は 50% 鏡文字／にてる字があれば 50% でそれ）
function targetsFromWord(word) {
  return [...word].map(kana => {
    const conf = HIRA_CONFUSE[kana];
    const useMirror = Math.random() < 0.5 || !conf;
    return { kana, pool: 'hiragana', wrongKind: useMirror ? 'mirror' : 'confuse', wrongKana: useMirror ? kana : conf };
  });
}

// KanjiVGストロークから字をミニ描画。mirror=true で左右反転（x' = vbW - x）。
function drawKana(kana, pool, cx, cy, size, mirror, color) {
  const data = KANA_DATA[pool].characters[kana];
  if (!data) return;
  const { w: vw, h: vh } = parseViewBox(KANA_DATA.viewBox, 109);
  const scale = size / Math.max(vw, vh);
  const ox = cx - (vw * scale) / 2, oy = cy - (vh * scale) / 2;
  ctx.save(); ctx.strokeStyle = color || '#2b3a67'; ctx.lineWidth = Math.max(3, size * 0.09); ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  for (const d of data.strokes) {
    const flat = flattenCommands(parsePathD(d), 18).map(p => ({ x: ox + (mirror ? (vw - p.x) : p.x) * scale, y: oy + p.y * scale }));
    ctx.beginPath(); ctx.moveTo(flat[0].x, flat[0].y);
    for (const p of flat.slice(1)) ctx.lineTo(p.x, p.y);
    ctx.stroke();
  }
  ctx.restore();
}

class G2Maze extends GameBase {
  init(ctx2, services) {
    this.services = services || {};
    this.word = pickWord();                             // 正解ルートで完成する ことば
    this.targets = targetsFromWord(this.word.w);        // forkOrder に対応（分岐数＝文字数）
    this.geo = buildGeometry(view.w, view.h, this.targets.length);
    this.collected = [];                                // 集めた字
    this.pos = { kind: 'edge', edgeId: 'E0', idx: 0 };  // kind: edge | fork
    this.progress = {};                                 // edgeId → 最深到達idx
    this.forksPassed = 0; this.mistakes = 0; this.itemsPracticed = [];
    this.done = false; this.tracing = false;
    this._announcedFork = null; this._msg = null; this._goalT = 0;
    this._speak('もじを あつめて ゴールを めざそう！');
  }

  _speak(t, o) { const s = this.services.speech; if (s && s.speak) s.speak(t, o); }
  _sfx(n) { const a = this.services.audio; if (a && typeof a[n] === 'function') a[n](); }
  _edge(id) { return this.geo.edges.find(e => e.id === id); }
  _forkTarget(forkId) { return this.targets[this.geo.forkOrder.indexOf(forkId)]; }

  update(dt) {
    if (this._msg) { this._msg.t += dt; if (this._msg.t > 1.6) this._msg = null; }
    if (this.done) this._goalT += dt;
  }

  _announce(forkId) {
    if (this._announcedFork === forkId) return;
    this._announcedFork = forkId;
    const t = this._forkTarget(forkId);
    this._speak(`つぎは 「${t.kana}」 だよ！`);
  }

  onPointerDown(x, y) { this.tracing = true; this._advance(x, y); }
  onPointerMove(x, y) { if (this.tracing) this._advance(x, y); }
  onPointerUp() { this.tracing = false; }

  _advance(x, y) {
    if (this.done) return;
    if (this.pos.kind === 'fork') {
      // 両枝の入口候補（各枝の先頭1〜3点）から「指に最も近い点」を選ぶ。
      // 固定順で判定すると分岐直後の重なり領域で意図しない枝に吸い付くため、必ず最近傍で決める。
      const fk = this.geo.forks[this.pos.forkId];
      let best = null;
      for (const eid of [fk.correct, fk.wrong]) {
        const e = this._edge(eid);
        for (let k = 1; k <= 3 && k < e.pts.length; k++) {
          const d = Math.hypot(x - e.pts[k].x, y - e.pts[k].y);
          if (d <= R && (!best || d < best.d)) best = { eid, k, d };
        }
      }
      if (best) {
        this.pos = { kind: 'edge', edgeId: best.eid, idx: best.k };
        this.progress[best.eid] = Math.max(this.progress[best.eid] || 0, best.k);
      }
      return;
    }
    const e = this._edge(this.pos.edgeId);
    // 窓式カーソル：現在idxの前後K点で指に最も近い点へ（前進も後退も自然・振動しない）
    const K = 4;
    let bestK = this.pos.idx, bestD = Infinity;
    for (let k = Math.max(0, this.pos.idx - K); k <= Math.min(e.pts.length - 1, this.pos.idx + K); k++) {
      const d = Math.hypot(x - e.pts[k].x, y - e.pts[k].y);
      if (d < bestD) { bestD = d; bestK = k; }
    }
    if (bestD <= R) this.pos.idx = bestK;
    this.progress[e.id] = Math.max(this.progress[e.id] || 0, this.pos.idx);

    if (this.pos.idx <= 0 && e.from.startsWith('F')) {
      this.pos = { kind: 'fork', forkId: e.from };
      return;
    }
    if (this.pos.idx >= e.pts.length - 1) {
      if (e.to === 'G') {
        if (e.correct) { this.forksPassed++; const t = this._forkTarget(e.from); this.collected.push(t.kana); this.itemsPracticed.push(t.kana); }
        this.done = true; this._sfx('sfxSparkle');
        this._speak(`ゴール！ ${this.word.w}、かんせい！`);
        return;
      }
      if (e.to.startsWith('F')) {
        if (e.correct) {
          this.forksPassed++;
          const t = this._forkTarget(e.from);
          this.collected.push(t.kana); this.itemsPracticed.push(t.kana);
          this._sfx('sfxCorrect');
          this._speak(`「${t.kana}」 げっと！`, { interrupt: false });
        }
        this.pos = { kind: 'fork', forkId: e.to };
        this._announce(e.to);
        return;
      }
      if (e.to.startsWith('D')) {
        this.mistakes++;
        this._sfx('sfxWrong');
        this._msg = { text: 'あれれ、こっちは ちがう じ！', t: 0 };
        this._speak('あれれ、ちがう じ だ！ もどろう');
        this.pos = { kind: 'fork', forkId: e.from };
        return;
      }
    }
  }

  _labelPosFor(edgeId) {
    const e = this._edge(edgeId);
    const p = e.pts[Math.min(8, e.pts.length - 1)];
    const p0 = e.pts[0];
    const dx = p.x - p0.x, dy = p.y - p0.y, len = Math.hypot(dx, dy) || 1;
    return { x: p.x + (dx / len) * 22, y: p.y + (dy / len) * 22 };
  }

  render() {
    const W = view.w, H = view.h;
    // 道（下地→通過分）
    for (const e of this.geo.edges) {
      ctx.save(); ctx.strokeStyle = '#f5efdf'; ctx.lineWidth = CORRIDOR; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      this._poly(e.pts); ctx.stroke();
      ctx.strokeStyle = 'rgba(140,120,80,0.35)'; ctx.lineWidth = CORRIDOR + 6; ctx.globalCompositeOperation = 'destination-over';
      this._poly(e.pts); ctx.stroke();
      ctx.restore();
    }
    for (const e of this.geo.edges) {
      const upto = this.progress[e.id] || 0;
      if (upto > 0) {
        ctx.save(); ctx.strokeStyle = e.correct === false ? 'rgba(230,120,110,0.55)' : 'rgba(87,192,106,0.75)';
        ctx.lineWidth = CORRIDOR * 0.55; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
        this._poly(e.pts.slice(0, upto + 1)); ctx.stroke(); ctx.restore();
      }
    }
    // スタート/ゴール
    const s0 = this._edge('E0').pts[0];
    label('🐣', s0.x - 26, s0.y, { size: 30 });
    const gEdge = this._edge(`C${this.targets.length}`); const gp = gEdge.pts[gEdge.pts.length - 1];
    label('🥚', gp.x + 24, gp.y, { size: 32 });
    label('ゴール', gp.x + 24, gp.y + 28, { size: 13, color: '#2b3a67', weight: 700 });
    // 分岐の字（正しい形＝正解エッジ側、まちがい形＝ハズレ側）
    this.geo.forkOrder.forEach((fid, i) => {
      const t = this.targets[i];
      const fk = this.geo.forks[fid];
      const cp = this._labelPosFor(fk.correct);
      const wp = this._labelPosFor(fk.wrong);
      const size = Math.min(W, H) * 0.105;
      this._badge(cp.x, cp.y, size);
      drawKana(t.kana, t.pool, cp.x, cp.y, size * 0.72, false, '#2b3a67');
      this._badge(wp.x, wp.y, size);
      if (t.wrongKind === 'mirror') drawKana(t.kana, t.pool, wp.x, wp.y, size * 0.72, true, '#2b3a67');
      else drawKana(t.wrongKana, t.pool, wp.x, wp.y, size * 0.72, false, '#2b3a67');
    });
    // 現在地カーソル
    const cur = this._curPoint();
    ctx.save(); ctx.fillStyle = 'rgba(255,197,58,0.95)'; ctx.beginPath(); ctx.arc(cur.x, cur.y, 13, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke(); ctx.restore();
    // 上部：お題＋あつめた字（？ボックス）
    if (!this.done) {
      const fid = this.pos.kind === 'fork' ? this.pos.forkId : this._nextForkAhead();
      if (fid) {
        const t = this._forkTarget(fid);
        label(`つぎは 「${t.kana}」！`, W / 2, H * 0.115, { size: Math.min(W * 0.042, 24), color: '#2b3a67', weight: 800 });
      }
    }
    this._renderCollected(W, H);
    if (this._msg) {
      const a = Math.max(0, 1 - this._msg.t / 1.6);
      label(this._msg.text, W / 2, H * 0.245, { size: 19, color: `rgba(200,70,60,${a.toFixed(2)})`, weight: 800 });
    }
    // ゴール演出：ことばの絵カード
    if (this.done) this._renderGoalCard(W, H);
  }

  _renderCollected(W, H) {
    // 「あつめた じ」ボックス列：未取得は ？
    const n = this.targets.length;
    const s = Math.min(W * 0.055, H * 0.075, 34);
    const gap = s * 0.25;
    const total = n * s + (n - 1) * gap;
    let x = (W - total) / 2;                          // 上部中央（お題の直下・通路帯 y≥0.30H と被らない）
    const y = H * 0.165;
    for (let i = 0; i < n; i++) {
      ctx.save(); ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.strokeStyle = i < this.collected.length ? '#57c06a' : '#c9d5ea'; ctx.lineWidth = 3;
      rrPath(x, y, s, s, 8); ctx.fill(); ctx.stroke(); ctx.restore();
      label(i < this.collected.length ? this.collected[i] : '？', x + s / 2, y + s / 2, { size: s * 0.6, color: i < this.collected.length ? '#2b3a67' : '#a6b2c8', weight: 800 });
      x += s + gap;
    }
  }

  _renderGoalCard(W, H) {
    const t = Math.min(1, this._goalT / 0.35);
    const ease = 1 - Math.pow(1 - t, 3);
    ctx.save(); ctx.fillStyle = `rgba(255,255,255,${(0.55 * ease).toFixed(2)})`; ctx.fillRect(0, 0, W, H); ctx.restore();
    const bw = Math.min(W * 0.6, 420) * (0.7 + 0.3 * ease), bh = Math.min(H * 0.52, 300) * (0.7 + 0.3 * ease);
    const bx = (W - bw) / 2, by = (H - bh) / 2;
    ctx.save(); ctx.globalAlpha = ease;
    ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#57c06a'; ctx.lineWidth = 5;
    rrPath(bx, by, bw, bh, 24); ctx.fill(); ctx.stroke();
    label(this.word.e, W / 2, by + bh * 0.34, { size: bh * 0.34 });
    label(this.word.w, W / 2, by + bh * 0.66, { size: Math.min(bh * 0.17, bw * 0.9 / Math.max(2, this.word.w.length)), color: '#2b3a67', weight: 800 });
    label('もじを つないだら できた！ 🎉', W / 2, by + bh * 0.86, { size: Math.min(bh * 0.075, 17), color: '#2b3a67', weight: 700 });
    ctx.restore();
    drawGao(bx + bw * 0.06, by - 8, Math.min(W * 0.05, 38), 'happy');
  }

  _nextForkAhead() {
    if (this.pos.kind !== 'edge') return null;
    const e = this._edge(this.pos.edgeId);
    return e.to.startsWith('F') ? e.to : null;
  }
  _badge(cx, cy, size) {
    ctx.save(); ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.strokeStyle = '#c9d5ea'; ctx.lineWidth = 3;
    rrPath(cx - size / 2, cy - size / 2, size, size, 14); ctx.fill(); ctx.stroke(); ctx.restore();
  }
  _poly(pts) { ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y); for (const p of pts.slice(1)) ctx.lineTo(p.x, p.y); }
  _curPoint() {
    if (this.pos.kind === 'fork') { const fk = this.geo.forks[this.pos.forkId]; return this._edge(fk.correct).pts[0]; }
    const e = this._edge(this.pos.edgeId); return e.pts[Math.min(this.pos.idx, e.pts.length - 1)];
  }

  isComplete() { return this.done; }
  getResult() { return { correctCount: this.forksPassed, mistakes: this.mistakes, itemsPracticed: this.itemsPracticed }; }
  dispose() {}
}

/* ===== core/scene-manager.js ===== */
// core/scene-manager.js — シーンの登録/切替と、update/render/ポインタの現在シーンへの委譲。
// シーン契約：任意で enter()/update(dt)/render()/onPointerDown(x,y)/onPointerMove(x,y)/onPointerUp(x,y)/dispose()。
// scene クラスの import はしない（登録は main.js。連結順の依存を避けるため）。

class SceneManager {
  constructor() { this.scenes = {}; this.current = null; this.currentName = null; }
  register(name, scene) { this.scenes[name] = scene; scene.manager = this; return this; }
  set(name, params) {
    const s = this.scenes[name]; if (!s) { console.warn('[scene] unknown:', name); return; }
    if (this.current && this.current.dispose) { try { this.current.dispose(); } catch (_) {} }
    this.currentName = name; this.current = s;
    if (s.enter) { try { s.enter(params); } catch (e) { console.error('[scene enter]', name, e); } }
  }
  update(dt) { const c = this.current; if (c && c.update) c.update(dt); }
  render() { const c = this.current; if (c && c.render) c.render(); }
  onPointerDown(x, y) { const c = this.current; if (c && c.onPointerDown) c.onPointerDown(x, y); }
  onPointerMove(x, y) { const c = this.current; if (c && c.onPointerMove) c.onPointerMove(x, y); }
  onPointerUp(x, y) { const c = this.current; if (c && c.onPointerUp) c.onPointerUp(x, y); }
}

const scenes = new SceneManager();

/* ===== core/game-loop.js ===== */
// core/game-loop.js — 固定タイムステップのメインループ（dash 同型）。scenes に委譲。

const clock = { t: 0 };          // 経過秒（演出の時間基準・シーンから参照可）
let _last = 0, _acc = 0, _running = false;

function frame(t) {
  if (!_running) return;
  if (!_last) _last = t;
  let dt = (t - _last) / 1000; _last = t;
  if (dt > 0.1) dt = 0.1;        // タブ復帰などの巨大 dt を抑制
  clock.t += dt; _acc += dt;
  let steps = 0;
  while (_acc >= STEP && steps < 5) { scenes.update(STEP); _acc -= STEP; steps++; }
  if (_acc > STEP) _acc = 0;
  scenes.render();
  requestAnimationFrame(frame);
}
function startLoop() { if (_running) return; _running = true; _last = 0; _acc = 0; requestAnimationFrame(frame); }
function stopLoop() { _running = false; }

/* ===== scenes/title.js ===== */
// scenes/title.js — 起動画面。ここで音声アンロック（input.js 経由）→ home へ。
// タイトルは1文字ずつ「文字数×サイズから計算した位置」に描く（固定オフセット禁止＝どのサイズでも重ならない）。

const TITLE_CHARS = [...'もじざうるす'];
const TITLE_COLORS = ['#ff8a5c', '#ffc53a', '#57c06a', '#5cc8ff', '#b58cff', '#ff9ec6'];

class TitleScene {
  enter() { this.t = 0; this.started = false; setBgmTrack('title'); }
  update(dt) { this.t += dt; }
  render() {
    fillBg();
    const W = view.w, H = view.h;
    // タイトル文字：measureText の実測幅で累積配置（フォント差・端末差があっても物理的に重ならない）
    const n = TITLE_CHARS.length;
    let size = Math.min((W * 0.84) / n, H * 0.2, 96);
    let pad = size * 0.06;
    let widths = TITLE_CHARS.map(ch => textWidth(ch, size, 800));
    let total = widths.reduce((a, b) => a + b, 0) + pad * (n - 1);
    const maxW = W * 0.88;
    if (total > maxW) {                      // 実測が想定より広いフォントでも1回の縮小で必ず収める
      const k = maxW / total;
      size *= k; pad *= k;
      widths = TITLE_CHARS.map(ch => textWidth(ch, size, 800));
      total = widths.reduce((a, b) => a + b, 0) + pad * (n - 1);
    }
    const baseY = H * 0.22;
    let cx = (W - total) / 2;
    TITLE_CHARS.forEach((ch, i) => {
      const bob = Math.sin(this.t * 2.2 + i * 0.7) * size * 0.07;
      label(ch, cx + widths[i] / 2, baseY + bob, { size, color: TITLE_COLORS[i % TITLE_COLORS.length], weight: 800, shadow: 3 });
      cx += widths[i] + pad;
    });
    label('ひらがな・カタカナで あそぼう！', W / 2, baseY + size * 0.85, { size: Math.min(W * 0.035, H * 0.045, 20), color: COLORS.ink, weight: 700 });
    // ガオ（ぴょこぴょこ）
    const gbob = Math.sin(this.t * 3) * H * 0.014;
    drawGao(W / 2, H * 0.56 + gbob, Math.min(W * 0.11, H * 0.15, 72), 'happy');
    // 「タップしてスタート」点滅
    const a = 0.55 + 0.45 * Math.sin(this.t * 4);
    ctx.save(); ctx.globalAlpha = a;
    label('タップして スタート', W / 2, H * 0.84, { size: Math.min(W * 0.05, H * 0.065, 34), color: COLORS.ink, weight: 800, shadow: 1.5 });
    ctx.restore();
  }
  onPointerDown() {
    if (this.started) return; this.started = true;   // 二度押し防止
    sfxTap();
    speak('もじざうるすへ ようこそ！');
    scenes.set(SCENE.HOME);
  }
}
